services:
  postgres:
    image: postgres:16-alpine
    container_name: tribeblock-university-postgres
    environment:
      POSTGRES_DB: tribeblock_university
      POSTGRES_USER: tribeblock
      POSTGRES_PASSWORD: tribeblock
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tribeblock -d tribeblock_university"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
